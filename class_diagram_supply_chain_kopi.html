
<style>
  #erd { padding: 8px 0; }
  #erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efea',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
    secondaryColor: dark ? '#1e1e1c' : '#e8e6e0',
    tertiaryColor: dark ? '#161614' : '#d3d1c7',
  },
});

const diagram = `classDiagram
  class Users {
    +String id_user
    +String username
    +String email
    +String password
    +String role
    +String no_hp
    +String status_login
    +login()
    +logout()
    +register()
  }

  class Petani {
    +String id_petani
    +String id_user
    +String nama_petani
    +String nik
    +String alamat
    +String no_telp
    +String status_verifikasi
    +tambahDataLahan()
    +catatHasilPanen()
    +inputDataPenjualan()
  }

  class Admin {
    +String id_admin
    +String id_user
    +String nama_admin
    +String email
    +verifikasiAkun()
    +generateRekapData()
  }

  class Pembeli {
    +String id_pembeli
    +String id_user
    +String nama_pembeli
    +String alamat
    +String no_telp
    +cariKopi()
    +lakukanPembelian()
    +trackPenjualan()
    +getHistoryPembelian()
  }

  class MitraCafe {
    +String id_cafe
    +String id_user
    +String nama_cafe
    +String lokasi
    +String no_telp
    +tampilkanDataMitra()
    +updateProfilMitra()
  }

  class Lahan {
    +String id_lahan
    +String id_petani
    +String nama_lahan
    +String koordinat
    +Float luas_lahan
    +String mdpl
    +String keterangan
    +tambahLahan()
    +editLahan()
    +hapusLahan()
  }

  class Panen {
    +String id_panen
    +String id_petani
    +String id_lahan
    +Date tanggal_panen
    +String komoditas
    +String fase_kopi
    +String metode_proses
    +Float berat_panen_kg
    +String keterangan
    +catatPanen()
    +editDataPanen()
  }

  class Produk {
    +String id_produk
    +String id_panen
    +String nama_produk
    +String deskripsi
    +Float harga_per_kg
    +Float stok_kg
    +Date tanggal_update
    +updateHarga()
    +updateStok()
    +getDetailKopi()
    +getDaftarHarga()
  }

  class Transaksi {
    +String id_transaksi
    +String id_petani
    +String id_pembeli
    +String id_produk
    +Date tanggal_transaksi
    +Float berat_kg
    +Float total_harga
    +String status_transaksi
    +String status_distribusi
    +Date date_penjualan
    +buatTransaksi()
    +updateStatusTrack()
  }

  class Laporan {
    +String id_laporan
    +String id_admin
    +String id_transaksi
    +String jenis_laporan
    +Date periode_mulai
    +Date periode_selesai
    +Date tanggal_buat
    +String isi_laporan
    +hitungTotalPenjualan()
    +hitungTotalPembelian()
    +tampilkanRekap()
  }

  Users "1" --> "1" Petani : memiliki
  Users "1" --> "1" Admin : memiliki
  Users "1" --> "1" Pembeli : memiliki
  Users "1" --> "1" MitraCafe : memiliki
  Petani "1" --> "1" Lahan : memiliki
  Lahan "1" --> "N" Panen : menghasilkan
  Panen "1" --> "N" Produk : menghasilkan
  Produk "1" --> "N" Transaksi : digunakan
  Petani "1" --> "N" Transaksi : melakukan
  Pembeli "1" --> "N" Transaksi : melakukan
  MitraCafe "1" --> "N" Transaksi : melakukan
  Admin "1" --> "N" Laporan : membuat
  Transaksi "1" --> "N" Laporan : dicatat
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
